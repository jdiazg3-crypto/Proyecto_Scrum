<!DOCTYPE html>
<html>
<body>

<h2>Contador</h2>
<p id="numero">0</p>

<button onclick="sumar()">Sumar</button>
<button onclick="restar()">Restar</button>
<button onclick="reiniciar()">Reiniciar</button>

<script>
let num = 0;

function sumar() {
  num++;
  document.getElementById("numero").innerText = num;
}

function restar() {
  num--;
  document.getElementById("numero").innerText = num;
}

function reiniciar() {
  num = 0;
  document.getElementById("numero").innerText = num;
}
</script>

</body>
</html>
